<style>
:root{
  --ink:#1B2537;
  --ink-soft:#4A5568;
  --paper:#FFFFFF;
  --mist:#F4F7FB;
  --blue:#2451C7;
  --blue-deep:#183A96;
  --cta:#FF6B2C;
  --cta-deep:#E5541B;
  --green:#25D366;
  --gold:#FFB020;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Assistant',sans-serif;color:var(--ink);line-height:1.6;font-size:17px;
  min-height:100vh;display:flex;flex-direction:column;
  background:
    radial-gradient(900px 480px at 85% -10%, #EAF0FF 0%, transparent 60%),
    radial-gradient(700px 400px at 0% 110%, #FFF2E9 0%, transparent 60%),
    var(--paper);
}
a{text-decoration:none;color:inherit}
h1,h2{font-family:'Secular One',sans-serif;font-weight:400;line-height:1.25}

.topbar{background:rgba(255,255,255,.96);border-bottom:1px solid #E7ECF3}
.topbar-in{display:flex;justify-content:center;padding:10px 20px;max-width:1080px;margin:0 auto}
.logo-img{height:84px;width:auto;margin:-8px 0}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{
  background:#fff;border-radius:22px;padding:44px 36px;max-width:560px;width:100%;
  box-shadow:0 20px 50px rgba(24,58,150,.14);text-align:center;
  border-top:6px solid var(--blue);
}
.check{
  width:88px;height:88px;margin:0 auto 22px;border-radius:50%;
  background:#EAF9F0;display:flex;align-items:center;justify-content:center;
  animation:pop .5s cubic-bezier(.2,1.6,.4,1) both;
}
.check svg{width:46px;height:46px;color:#1FA463}
.check svg path{stroke-dasharray:60;stroke-dashoffset:60;animation:draw .6s .25s ease forwards}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes draw{to{stroke-dashoffset:0}}
@media (prefers-reduced-motion:reduce){.check{animation:none}.check svg path{animation:none;stroke-dashoffset:0}}

h1{font-size:clamp(1.7rem,5vw,2.3rem);margin-bottom:10px}
.msg{color:var(--ink-soft);font-size:1.1rem;margin-bottom:6px}
.msg strong{color:var(--ink)}
.eta{
  display:inline-block;background:var(--mist);color:var(--blue);
  font-weight:800;padding:8px 18px;border-radius:99px;margin:14px 0 26px;font-size:.98rem;
}
.divider{color:#A8B2C4;font-weight:700;font-size:.9rem;margin-bottom:16px}
.call-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,var(--cta),var(--cta-deep));color:#fff;
  font-family:'Assistant';font-weight:800;font-size:1.4rem;letter-spacing:.02em;
  padding:16px 24px;border-radius:14px;margin-bottom:12px;
  box-shadow:0 10px 28px rgba(255,107,44,.35);
  transition:transform .15s ease;
}
.call-btn:hover{transform:scale(1.02)}
.call-btn svg{width:24px;height:24px}
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#EAFBF0;color:#128C4B;font-weight:800;
  padding:14px;border-radius:14px;transition:background .15s;
}
.wa-btn:hover{background:#DBF6E6}
.wa-btn svg{width:20px;height:20px}
.back{display:inline-block;margin-top:26px;color:var(--ink-soft);font-weight:700;font-size:.95rem}
.back:hover{color:var(--blue)}

footer{text-align:center;padding:18px;color:#8E99AE;font-size:.85rem}
:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
</style>
</head>
